name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      # Linux needs system libraries for winit/wgpu/egui (X11 + Wayland),
      # rfd (GTK file dialogs), reqwest's native-tls (OpenSSL), and mlua needs a
      # C toolchain (preinstalled on the runner). Windows pulls these in via the
      # MSVC toolchain + schannel and needs no extra packages.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev libgtk-3-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev \
            libx11-dev libxcursor-dev libxi-dev libxrandr-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # Note: --locked is intentionally omitted because Cargo.lock is gitignored
      # in this repo. Commit Cargo.lock (and re-add --locked) for reproducible,
      # pinned dependency builds.
      - name: Build (workspace)
        run: cargo build --workspace

      - name: Test (workspace)
        run: cargo test --workspace

  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    # Blocking: `cargo fmt --all --check` is enforced (the tree is now
    # rustfmt-clean). clippy runs but warnings are not denied yet (~50 in the
    # backlog) — add `-D warnings` to enforce once those are cleared.
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev libgtk-3-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev \
            libx11-dev libxcursor-dev libxi-dev libxrandr-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: rustfmt
        run: cargo fmt --all --check

      - name: clippy
        run: cargo clippy --workspace --all-targets

      # The MCP API reference is generated from server::tool_list(); fail if it
      # has drifted from the committed docs/mcp-api.md.
      - name: Regenerate MCP API docs
        run: cargo run -p photonic-mcp --bin dump_tools | python3 tools/gen-mcp-docs.py > docs/mcp-api.md

      - name: Check MCP API docs are up to date
        run: git diff --exit-code docs/mcp-api.md
