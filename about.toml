# cargo-about configuration — controls THIRD-PARTY-NOTICES generation.
# Run: cargo about generate about.hbs > THIRD-PARTY-NOTICES.md
# `accepted` lists the SPDX licenses we permit in the dependency tree. A new
# dependency under a license not listed here will cause generation to fail,
# which acts as a lightweight license-compliance gate.

accepted = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "BSL-1.0",
    "Unlicense",
    "Unicode-3.0",
    "CC0-1.0",
    "OFL-1.1",
    "NCSA",
    "LicenseRef-UFL-1.0",
]

# Many deps are dual/triple-licensed (e.g. "MIT OR Apache-2.0 OR LGPL-2.1-or-later").
# cargo-about picks the first accepted match above, so the copyleft alternatives
# (GPL/LGPL) are never selected.
