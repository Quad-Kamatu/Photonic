# cargo-deny configuration — license & supply-chain gate.
# Install:  cargo install cargo-deny --locked
# Run:      cargo deny check licenses
# Intended to run in CI so a new dependency under a non-permissive license fails
# the build instead of silently shipping in an MIT-licensed binary.

[licenses]
# Only allow licenses compatible with redistributing under MIT.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "BSL-1.0",
    "Unlicense",
    "Unicode-3.0",
    "CC0-1.0",
    "OFL-1.1",
    "NCSA",
]
# Confidence threshold for detecting a license from a text file (0.0 - 1.0).
confidence-threshold = 0.8

# Crates that declare their license via a file rather than an SPDX expression.
[[licenses.clarify]]
crate = "display-info"
expression = "Apache-2.0"
license-files = [{ path = "LICENSE", hash = 0xdb1c553a }]

# egui's bundled default fonts include the Ubuntu font, licensed under the
# Ubuntu Font License (UFL-1.0). It has no SPDX identifier, so allow it
# explicitly for this crate only. The font is permissively redistributable.
[[licenses.exceptions]]
crate = "epaint_default_fonts"
allow = ["LicenseRef-UFL-1.0"]

# option-ext is MPL-2.0 (file-level copyleft). It is an unmodified *transitive*
# dependency (dirs → dirs-sys → option-ext) pulled in via fastembed's on-device
# embedding model in photonic-embed. Redistributing it unmodified is compatible
# with shipping the app under MIT, so allow MPL-2.0 for this crate only.
[[licenses.exceptions]]
crate = "option-ext"
allow = ["MPL-2.0"]

# webpki-roots ships Mozilla's CA certificate set under CDLA-Permissive-2.0, a
# permissive (non-copyleft) data license. It is a transitive dependency of the
# TLS/networking stack; redistributing the cert bundle unmodified is fine.
[[licenses.exceptions]]
crate = "webpki-roots"
allow = ["CDLA-Permissive-2.0"]

[bans]
# Warn on multiple versions of the same crate (size/audit hygiene, not blocking).
multiple-versions = "warn"

[advisories]
# Use the default RustSec advisory database; fail on known vulnerabilities.
version = 2
yanked = "deny"
# Acknowledged unmaintained *transitive* dependencies (no vulnerability, no
# maintained drop-in). Revisit when upstreams migrate off them.
ignore = [
    "RUSTSEC-2025-0057", # fxhash — unmaintained (pulled in transitively)
    "RUSTSEC-2024-0436", # paste — unmaintained (pulled in transitively)
    "RUSTSEC-2025-0119", # number_prefix — unmaintained (transitive via indicatif/hf-hub)
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
